# ==============================================================================
# Nginx Configuration for Digital Filing Cabinet (DFC)
# Production — dfc.dabiko-software.tech
# ==============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name dfc.dabiko-software.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dfc.dabiko-software.tech;

    # ===========================================================================
    # SSL/TLS
    # ===========================================================================
    ssl_certificate /etc/nginx/ssl/dfc.dabiko-software.tech.crt;
    ssl_certificate_key /etc/nginx/ssl/dfc.dabiko-software.tech.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_dhparam /etc/nginx/dhparam.pem;

    # ===========================================================================
    # Security Headers — defined ONCE here so ALL location blocks inherit them.
    # NOTE: any location block that adds its own add_header will lose these.
    #       Avoid add_header in location blocks; use expires/gzip directives instead.
    # ===========================================================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ===========================================================================
    # Logging & Limits
    # ===========================================================================
    access_log /var/log/nginx/dfc_access.log;
    error_log  /var/log/nginx/dfc_error.log warn;

    client_max_body_size 500M;
    client_body_buffer_size 128k;
    client_body_timeout 300s;
    client_header_timeout 300s;

    # ===========================================================================
    # Health check
    # ===========================================================================
    location = /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ===========================================================================
    # Django REST API
    # ===========================================================================
    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ===========================================================================
    # Django Admin
    # ===========================================================================
    location /admin/ {
        proxy_pass http://django:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===========================================================================
    # Static Files
    # ===========================================================================
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        gzip on;
        gzip_vary on;
        gzip_types text/css text/javascript application/javascript application/json image/svg+xml;
    }

    # ===========================================================================
    # Media Files (served only via Django X-Accel-Redirect)
    # ===========================================================================
    location /media/ {
        internal;
        alias /var/www/media/;
    }

    # ===========================================================================
    # Block exploit paths
    # ===========================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.php$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===========================================================================
    # React SPA — catch-all (no add_header → inherits all server-level headers)
    # ===========================================================================
    location / {
        root  /var/www/frontend;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }
}
