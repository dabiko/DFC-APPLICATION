# ==============================================================================
# Nginx Configuration for Digital Filing Cabinet (DFC)
# Production-ready configuration with TLS 1.2/1.3 and security headers
# ==============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name dfc.cccplc.com;

    # ACME challenge for Let's Encrypt (if using Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dfc.cccplc.com;

    # ==============================================================================
    # SSL/TLS Configuration
    # ==============================================================================

    # SSL Certificate paths
    # Replace with actual certificate paths
    ssl_certificate /etc/nginx/ssl/dfc.cccplc.com.crt;
    ssl_certificate_key /etc/nginx/ssl/dfc.cccplc.com.key;

    # Trusted CA certificates for OCSP stapling
    ssl_trusted_certificate /etc/nginx/ssl/ca-bundle.crt;

    # SSL Protocols - TLS 1.2 and 1.3 only (no TLS 1.0/1.1)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Cipher suites (Mozilla Modern configuration)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # SSL session configuration
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Diffie-Hellman parameters (generate with: openssl dhparam -out /etc/nginx/dhparam.pem 4096)
    ssl_dhparam /etc/nginx/dhparam.pem;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ==============================================================================
    # Security Headers
    # ==============================================================================

    # HTTP Strict Transport Security (HSTS)
    # Force HTTPS for 2 years, including subdomains
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; form-action 'self'; base-uri 'self';" always;

    # Permissions Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()" always;

    # Cross-Origin Policies
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # ==============================================================================
    # Logging
    # ==============================================================================

    access_log /var/log/nginx/dfc_access.log;
    error_log /var/log/nginx/dfc_error.log;

    # ==============================================================================
    # Request Size Limits
    # ==============================================================================

    # Max upload size (for large document uploads)
    client_max_body_size 500M;
    client_body_buffer_size 128k;

    # Timeouts
    client_body_timeout 300s;
    client_header_timeout 300s;

    # ==============================================================================
    # Django Application
    # ==============================================================================

    location / {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts for long-running requests
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ==============================================================================
    # Static Files
    # ==============================================================================

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";

        # Enable gzip compression
        gzip on;
        gzip_vary on;
        gzip_types text/css text/javascript application/javascript application/json image/svg+xml;
        gzip_min_length 1000;
    }

    # ==============================================================================
    # Media Files (Authenticated Access)
    # ==============================================================================

    # Media files should be served via Django with authentication
    # Using X-Accel-Redirect for efficient file serving
    location /media/ {
        internal;  # Only accessible via X-Accel-Redirect from Django
        alias /var/www/media/;
    }

    # ==============================================================================
    # Health Check Endpoint
    # ==============================================================================

    location /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ==============================================================================
    # Block Common Exploit Attempts
    # ==============================================================================

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to PHP files (Django doesn't use PHP)
    location ~ \.php$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
