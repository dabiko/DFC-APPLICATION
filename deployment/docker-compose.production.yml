# ==============================================================================
# Docker Compose Configuration for DFC Production Deployment
# With Encryption, TLS, and Security Best Practices
# ==============================================================================

version: '3.8'

services:
  # ==============================================================================
  # PostgreSQL Database
  # ==============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: dfc_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dfc_prod}
      POSTGRES_USER: ${DB_USER:-dfc_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    networks:
      - dfc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dfc_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================================================
  # MinIO Object Storage with Server-Side Encryption
  # ==============================================================================
  minio:
    image: minio/minio:latest
    container_name: dfc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Enable server-side encryption
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY}
      # Enable TLS
      MINIO_SERVER_URL: https://minio.dfc.local:9000
      MINIO_BROWSER_REDIRECT_URL: https://minio-console.dfc.local
    volumes:
      - minio_data:/data
      - ./certs/minio:/root/.minio/certs:ro  # TLS certificates
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    networks:
      - dfc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==============================================================================
  # Elasticsearch with TLS and Authentication
  # ==============================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: dfc_elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      # Security
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=/usr/share/elasticsearch/config/certs/elasticsearch.key
      - xpack.security.http.ssl.certificate=/usr/share/elasticsearch/config/certs/elasticsearch.crt
      - xpack.security.http.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=/usr/share/elasticsearch/config/certs/elasticsearch.key
      - xpack.security.transport.ssl.certificate=/usr/share/elasticsearch/config/certs/elasticsearch.crt
      - xpack.security.transport.ssl.certificate_authorities=/usr/share/elasticsearch/config/certs/ca.crt
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./certs/elasticsearch:/usr/share/elasticsearch/config/certs:ro
    ports:
      - "9200:9200"
    networks:
      - dfc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f --insecure https://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==============================================================================
  # Redis Cache
  # ==============================================================================
  redis:
    image: redis:7-alpine
    container_name: dfc_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - dfc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==============================================================================
  # RabbitMQ Message Broker
  # ==============================================================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: dfc_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-dfc_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: dfc
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    networks:
      - dfc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==============================================================================
  # HashiCorp Vault (Secrets Management)
  # ==============================================================================
  vault:
    image: hashicorp/vault:latest
    container_name: dfc_vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_API_ADDR: http://0.0.0.0:8200
    command: server
    volumes:
      - vault_data:/vault/data
      - ./vault/config.hcl:/vault/config/config.hcl:ro
    ports:
      - "8200:8200"
    networks:
      - dfc_network
    restart: unless-stopped

  # ==============================================================================
  # Django Application
  # ==============================================================================
  django:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dfc_django
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 300
    environment:
      # Django
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_ENV: production
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}

      # Database
      DB_NAME: ${DB_NAME:-dfc_prod}
      DB_USER: ${DB_USER:-dfc_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432

      # MinIO
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: dfc-documents
      MINIO_ENDPOINT: minio:9000
      MINIO_USE_SSL: "True"

      # Elasticsearch
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_USER: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      ELASTICSEARCH_USE_SSL: "True"
      ELASTICSEARCH_VERIFY_CERTS: "True"

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      # Celery
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-dfc_user}:${RABBITMQ_PASSWORD}@rabbitmq:5672/dfc
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1

      # Encryption
      FERNET_KEY_PRIMARY: ${FERNET_KEY_PRIMARY}
      FERNET_KEY_SECONDARY: ${FERNET_KEY_SECONDARY}

      # Vault
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_VERIFY_SSL: "False"  # Using HTTP internally

      # Security
      SECURE_SSL_REDIRECT: "True"
      SESSION_COOKIE_SECURE: "True"
      CSRF_COOKIE_SECURE: "True"
      SECURE_HSTS_SECONDS: "63072000"
      SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
      SECURE_HSTS_PRELOAD: "True"
    volumes:
      - ./backend/static:/app/staticfiles
      - ./backend/media:/app/media
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
      - elasticsearch
      - vault
    networks:
      - dfc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==============================================================================
  # Celery Worker
  # ==============================================================================
  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dfc_celery_worker
    command: celery -A config worker --loglevel=info --concurrency=4
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-dfc_user}:${RABBITMQ_PASSWORD}@rabbitmq:5672/dfc
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes:
      - ./backend/media:/app/media
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - dfc_network
    restart: unless-stopped

  # ==============================================================================
  # Celery Beat (Scheduler)
  # ==============================================================================
  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dfc_celery_beat
    command: celery -A config beat --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-dfc_user}:${RABBITMQ_PASSWORD}@rabbitmq:5672/dfc
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - dfc_network
    restart: unless-stopped

  # ==============================================================================
  # Nginx Reverse Proxy with TLS
  # ==============================================================================
  nginx:
    image: nginx:alpine
    container_name: dfc_nginx
    volumes:
      - ../nginx/dfc.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/nginx:/etc/nginx/ssl:ro
      - ./dhparam.pem:/etc/nginx/dhparam.pem:ro
      - ./backend/static:/var/www/static:ro
      - ./backend/media:/var/www/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django
    networks:
      - dfc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  dfc_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:
  redis_data:
  rabbitmq_data:
  vault_data:
