# Nginx configuration for Let's Encrypt ACME HTTP-01 challenge

server {
    listen 80;
    listen [::]:80;
    server_name dfc.cccplc.com api.dfc.cccplc.com minio.dfc.cccplc.com;

    # ACME challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}
