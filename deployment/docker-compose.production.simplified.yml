services:
  postgres:
    image: postgres:16-alpine
    container_name: dfc_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dfc_prod}
      POSTGRES_USER: ${DB_USER:-dfc_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dfc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dfc_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dfc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - dfc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: dfc_elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - xpack.license.self_generated.type=basic
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - dfc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: dfc_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - dfc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: dfc_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-dfc_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: dfc
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - dfc_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  django:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: dfc_django:latest
    container_name: dfc_django
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 300 --access-logfile - --error-logfile -
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      DB_NAME: ${DB_NAME:-dfc_prod}
      DB_USER: ${DB_USER:-dfc_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: dfc-documents
      MINIO_ENDPOINT: minio:9000
      MINIO_USE_SSL: "False"
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_USE_SSL: "False"
      ELASTICSEARCH_VERIFY_CERTS: "False"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-dfc_user}:${RABBITMQ_PASSWORD}@rabbitmq:5672/dfc
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      FERNET_KEY_PRIMARY: ${FERNET_KEY_PRIMARY}
      FERNET_KEY_SECONDARY: ${FERNET_KEY_SECONDARY}
      SESSION_COOKIE_SECURE: "True"
      CSRF_COOKIE_SECURE: "True"
      SECURE_HSTS_SECONDS: "63072000"
      SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
      SECURE_HSTS_PRELOAD: "True"
    volumes:
      - django_static:/app/staticfiles
      - django_media:/app/media
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
      - elasticsearch
    networks:
      - dfc_network
    restart: unless-stopped

  celery_worker:
    image: dfc_django:latest
    container_name: dfc_celery_worker
    command: celery -A config worker --loglevel=info --concurrency=2
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DB_NAME: ${DB_NAME:-dfc_prod}
      DB_USER: ${DB_USER:-dfc_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: dfc-documents
      MINIO_ENDPOINT: minio:9000
      MINIO_USE_SSL: "False"
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      ELASTICSEARCH_USE_SSL: "False"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-dfc_user}:${RABBITMQ_PASSWORD}@rabbitmq:5672/dfc
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      FERNET_KEY_PRIMARY: ${FERNET_KEY_PRIMARY}
      FERNET_KEY_SECONDARY: ${FERNET_KEY_SECONDARY}
    volumes:
      - django_media:/app/media
    depends_on:
      - django
    networks:
      - dfc_network
    restart: unless-stopped

  celery_beat:
    image: dfc_django:latest
    container_name: dfc_celery_beat
    command: celery -A config beat --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DB_NAME: ${DB_NAME:-dfc_prod}
      DB_USER: ${DB_USER:-dfc_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-dfc_user}:${RABBITMQ_PASSWORD}@rabbitmq:5672/dfc
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      FERNET_KEY_PRIMARY: ${FERNET_KEY_PRIMARY}
      FERNET_KEY_SECONDARY: ${FERNET_KEY_SECONDARY}
    depends_on:
      - django
    networks:
      - dfc_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dfc_nginx
    volumes:
      - ../nginx/dfc.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./dhparam.pem:/etc/nginx/dhparam.pem:ro
      - django_static:/var/www/static:ro
      - django_media:/var/www/media:ro
      - ./frontend-dist:/var/www/frontend:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django
    networks:
      - dfc_network
    restart: unless-stopped

networks:
  dfc_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  elasticsearch_data:
  redis_data:
  rabbitmq_data:
  django_static:
  django_media:
