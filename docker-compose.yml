
services:
  # PostgreSQL Database
  postgres:
    image: postgres:latest
    container_name: dfc_postgres
    restart: always
    environment:
      POSTGRES_DB: dfc_database
      POSTGRES_USER: dfc_admin_user
      POSTGRES_PASSWORD: dfc_password_2025
     # POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - dfc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dfc_admin_user -d dfc_database"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - PostgreSQL Admin UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dfc_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dfc.com
      PGADMIN_DEFAULT_PASSWORD: admin_password_2025
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"  # Access pgAdmin at http://localhost:5050
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - dfc_network
    depends_on:
      - postgres

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: dfc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dfc_minio_admin
      MINIO_ROOT_PASSWORD: dfc_minio_password_2025
      MINIO_DOMAIN: minio
      MINIO_SERVER_URL: http://minio:9000
    ports:
      - "9000:9000"  # MinIO API
      - "9001:9001"  # MinIO Console UI
    volumes:
      - minio_data:/data
    networks:
      - dfc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis (Caching & Celery Broker)
  redis:
    image: redis:7-alpine
    container_name: dfc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dfc_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Elasticsearch (Search Engine)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: dfc_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - dfc_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # RabbitMQ (Message Broker for Celery)
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: dfc_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: dfc_rabbit
      RABBITMQ_DEFAULT_PASS: dfc_rabbit_password_2025
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - dfc_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Django Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dfc_backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dfc_database
      DB_USER: dfc_admin_user
      DB_PASSWORD: dfc_password_2025

      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: dfc_minio_admin
      MINIO_SECRET_KEY: dfc_minio_password_2025
      MINIO_BUCKET_NAME: dfc-documents
      MINIO_USE_SSL: 'False'

     # Redis
      REDIS_URL: redis://redis:6379/0

      # Celery
      CELERY_BROKER_URL: amqp://dfc_rabbit:dfc_rabbit_password_2025@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      # Elasticsearch
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200

      # Django
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: django-insecure-docker-dev-key-change-in-production
      DEBUG: 'True'
      ALLOWED_HOSTS: localhost,127.0.0.1,backend

    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    networks:
      - dfc_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dfc_celery_worker
    command: celery -A config worker --loglevel=info
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dfc_dev
      DB_USER: dfc_user
      DB_PASSWORD: dfc_password_2025

      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: dfc_minio_admin
      MINIO_SECRET_KEY: dfc_minio_password_2025
      MINIO_BUCKET_NAME: dfc-documents
      MINIO_USE_SSL: 'False'

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Celery
      CELERY_BROKER_URL: amqp://dfc_rabbit:dfc_rabbit_password_2025@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      # Elasticsearch
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200

      # Django
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: django-insecure-docker-dev-key-change-in-production

    volumes:
      - ./backend:/app
      - backend_media:/app/media
    networks:
      - dfc_network
    depends_on:
      - backend
      - rabbitmq
      - redis
    restart: unless-stopped

  # Celery Beat (Scheduled Tasks)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dfc_celery_beat
    command: celery -A config beat --loglevel=info
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dfc_dev
      DB_USER: dfc_user
      DB_PASSWORD: dfc_password_2025

      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: dfc_minio_admin
      MINIO_SECRET_KEY: dfc_minio_password_2025
      MINIO_BUCKET_NAME: dfc-documents
      MINIO_USE_SSL: 'False'

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Celery
      CELERY_BROKER_URL: amqp://dfc_rabbit:dfc_rabbit_password_2025@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      # Django
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: django-insecure-docker-dev-key-change-in-production

    volumes:
      - ./backend:/app
    networks:
      - dfc_network
    depends_on:
      - backend
      - rabbitmq
      - redis
    restart: unless-stopped

  # React Frontend Application
