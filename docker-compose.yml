volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  rabbitmq_data:
    driver: local
  backend_media:
    driver: local
  backend_static:
    driver: local

networks:
  dfc_network:
    driver: bridge
