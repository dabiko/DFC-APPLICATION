  # MinIO Object Storage (S3-compatible)
  minio:
    image: quay.io/minio/aistor/minio:latest
    container_name: dfc_minio
    command: minio server /data --license /minio.license
    environment:
      MINIO_ROOT_USER: dfc_minio_admin
      MINIO_ROOT_PASSWORD: dfc_minio_password_2025
      MINIO_DOMAIN: minio
      MINIO_SERVER_URL: http://minio:9000
    ports:
      - "9000:9000"  # MinIO API
      - "9001:9001"  # MinIO Console UI
    volumes:
      - minio_data:/data
      - ./minio.license:/minio.license:ro
    networks:
      - dfc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis (Caching & Celery Broker)
  redis:
    image: redis:8.4.0
    container_name: dfc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dfc_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Elasticsearch (Search Engine)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.1
    container_name: dfc_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - dfc_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # RabbitMQ (Message Broker for Celery)
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: dfc_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: dfc_rabbit
      RABBITMQ_DEFAULT_PASS: dfc_rabbit_password_2025
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - dfc_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =========================================================================
  # BACKEND & FRONTEND REMOVED - Running locally for development
  # =========================================================================
  # To run backend locally:
  #   cd backend
  #   python manage.py runserver
  #
  # To run Celery worker locally:
  #   cd backend
  #   celery -A config worker --loglevel=info
  #
  # To run Celery beat locally (optional):
  #   cd backend
  #   celery -A config beat --loglevel=info
  #
  # To run frontend locally:
  #   cd frontend
  #   npm run dev
  # =========================================================================

volumes:
  minio_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  dfc_network:
    driver: bridge
